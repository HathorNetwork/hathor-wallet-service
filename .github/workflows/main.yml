name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        # We are using this image because the official one didn't
        # support settings default-authentication-plugin using env var
        # About the --default-authentication-plugin: https://stackoverflow.com/questions/50093144/mysql-8-0-client-does-not-support-authentication-protocol-requested-by-server/56509065#56509065
        image: centos/mysql-80-centos7
        env:
          MYSQL_DATABASE: wallet_service_ci
          MYSQL_USER: wallet_service_user
          MYSQL_PASSWORD: password
          MYSQL_DEFAULT_AUTHENTICATION_PLUGIN: mysql_native_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
      redis:
        image: redis:6.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install Nix
      uses: cachix/install-nix-action@v20
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes

    - name: Cache Nix
      uses: DeterminateSystems/magic-nix-cache-action@v2

    - name: Install dependencies
      run: |
        nix develop . -c yarn install

    - name: Initialize DB
      run: |
        nix develop . -c yarn sequelize db:migrate
      env:
        NODE_ENV: test
        CI_DB_NAME: wallet_service_ci
        CI_DB_USERNAME: wallet_service_user
        CI_DB_PASSWORD: password
        CI_DB_HOST: 127.0.0.1
        CI_DB_PORT: 3306

    - name: Run tests on the common modules project
      run: |
        nix develop . -c yarn workspace @wallet-service/common run test

    - name: Run tests on the daemon
      run: |
        nix develop . -c yarn workspace sync-daemon run test
      env:
        DB_ENDPOINT: 127.0.0.1
        DB_NAME: wallet_service_ci
        DB_USER: wallet_service_user
        DB_PASS: password
        DB_PORT: 3306
        STREAM_ID: f7d9157c-9906-4bd2-bc84-cfb9f5b607d1
        FULLNODE_PEER_ID: bdf4fa876f5cdba84be0cab53b21fc9eb45fe4b3d6ede99f493119d37df4e560

    - name: Run tests on the wallet-service
      run: |
        nix develop . -c yarn workspace wallet-service jest
      env:
        NODE_ENV: test
        STAGE: local
        MAX_ADDRESS_GAP: 10
        NETWORK: mainnet
        BLOCK_REWARD_LOCK: 300
        DEV_DB: mysql
        DB_ENDPOINT: 127.0.0.1
        DB_NAME: wallet_service_ci
        DB_USER: wallet_service_user
        DB_PASS: password
        DB_PORT: 3306
        CI_DB_USERNAME: wallet_service_user
        CI_DB_PASSWORD: password
        CI_DB_NAME: wallet_service_ci
        CONFIRM_FIRST_ADDRESS: true
        SERVICE_NAME: hathor-wallet-service
        DEFAULT_SERVER: https://node1.mainnet.hathor.network/v1a/
        VOIDED_TX_OFFSET: 5
        WS_DOMAIN: ws.wallet-service.hathor.network
        AUTH_SECRET: "foobar"
        WALLET_SERVICE_LAMBDA_ENDPOINT: ""
        FIREBASE_PROJECT_ID: ""
        FIREBASE_PRIVATE_KEY_ID: ""
        FIREBASE_PRIVATE_KEY: ""
        FIREBASE_CLIENT_EMAIL: ""
        FIREBASE_CLIENT_ID: ""
        FIREBASE_AUTH_URI: ""
        FIREBASE_TOKEN_URI: ""
        FIREBASE_AUTH_PROVIDER_X509_CERT_URL: ""
        FIREBASE_CLIENT_X509_CERT_URL: ""
        APPLICATION_NAME: "hathor-wallet-service"
        ACCOUNT_ID: 1234
        ALERT_MANAGER_REGION: us-east-1
        ALERT_MANAGER_TOPIC: alert-topic
        PUSH_ALLOWED_PROVIDERS: ""
        REDIS_URL: redis://127.0.0.1:6379
        REDIS_PASSWORD: ""
        IS_OFFLINE: 'true'

    - name: Run integration tests on the daemon
      run: |
        export NODE_ENV=test
        nix develop . -c yarn workspace sync-daemon run test_integration

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Extract version from tag
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

    - name: Extract dependency versions for migrator
      id: deps
      run: |
        echo "sequelize=$(jq -er '.devDependencies["sequelize"]' package.json)" >> "$GITHUB_OUTPUT"
        echo "sequelize_cli=$(jq -er '.devDependencies["sequelize-cli"]' package.json)" >> "$GITHUB_OUTPUT"
        echo "mysql2=$(jq -er '.devDependencies["mysql2"]' package.json)" >> "$GITHUB_OUTPUT"

    # To add multi-platform builds (e.g., arm64), add docker/setup-qemu-action before setup-buildx-action
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Login to DockerHub
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Copy daemon .dockerignore to root
      run: cp packages/daemon/.dockerignore .dockerignore

    - name: Build and push daemon dev image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: .
        file: packages/daemon/Dockerfile
        target: dev
        push: true
        tags: |
          hathornetwork/hathor-wallet-service-sync-daemon:dev
          hathornetwork/hathor-wallet-service-sync-daemon:dev-${{ steps.version.outputs.version }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Copy lambdas .dockerignore to root
      run: cp packages/wallet-service/.dockerignore .dockerignore

    - name: Build and push lambdas dev image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: .
        file: packages/wallet-service/Dockerfile.dev
        push: true
        tags: |
          hathornetwork/hathor-wallet-service-lambdas:dev
          hathornetwork/hathor-wallet-service-lambdas:dev-${{ steps.version.outputs.version }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Copy migrator .dockerignore to root
      run: cp db/.dockerignore .dockerignore

    - name: Build and push migrator dev image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: .
        file: db/Dockerfile.dev
        push: true
        build-args: |
          SEQUELIZE_VERSION=${{ steps.deps.outputs.sequelize }}
          SEQUELIZE_CLI_VERSION=${{ steps.deps.outputs.sequelize_cli }}
          MYSQL2_VERSION=${{ steps.deps.outputs.mysql2 }}
        tags: |
          hathornetwork/hathor-wallet-service-migrator:dev
          hathornetwork/hathor-wallet-service-migrator:dev-${{ steps.version.outputs.version }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
